spring.application.name=coduel-app
server.port=${PORT:8080}
server.servlet.context-path=/coduel
logging.config=classpath:log4j2-spring.xml
logging.level.root=INFO
logging.level.com.coduel=DEBUG


# ---- Code execution ----
# pool-size: 0 = auto (number of available CPUs)
execution.pool-size=0
execution.queue-capacity=50
execution.default-timeout-ms=5000
execution.max-timeout-ms=10000

# ---- Actuator ----
# base-path=/ so health is at /coduel/health (context-path), not /coduel/actuator/health
management.endpoints.web.base-path=/
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# ====================================================================================
# Secrets & env-specific values are injected from the environment (never committed).
#   - Production: set these as env vars on the host (Railway/Render Variables tab).
#   - Local dev:  run with the `local` profile (SPRING_PROFILES_ACTIVE=local), which
#                 loads the git-ignored application-local.properties with real values.
# ====================================================================================

# ---- RabbitMQ (async judging pipeline) ----
spring.rabbitmq.addresses=${SPRING_RABBITMQ_ADDRESSES}
spring.rabbitmq.publisher-confirm-type=correlated
# Consumer reliability: a failed judge is retried in-process with backoff, then dead-lettered
# (not silently dropped, not infinitely requeued). Re-judging is idempotent, so retries are safe.
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-attempts=4
spring.rabbitmq.listener.simple.retry.initial-interval=2000
spring.rabbitmq.listener.simple.retry.multiplier=2
spring.rabbitmq.listener.simple.retry.max-interval=10000
# On retry exhaustion, reject without requeue so the message is routed to the dead-letter exchange.
spring.rabbitmq.listener.simple.default-requeue-rejected=false

# ---- Security / Google OAuth2 login ----
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
server.forward-headers-strategy=framework

# ---- Frontend (SPA) ----
# Single source of truth for the browser app's origin. Drives BOTH the CORS allowed origin
# and the OAuth2 login success redirect. Defaults to the dev server; override in prod.
frontend.base-url=${FRONTEND_BASE_URL:http://localhost:5173}

# ---- Redis (Spring Session + matchmaking) ----
spring.data.redis.url=${SPRING_DATA_REDIS_URL}
# ---- HTTP session stored in Redis (30-day rolling, Codeforces-style) ----
spring.session.timeout=30d

# ---- Persistence (MySQL / TiDB) ----
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=update

# ---- Media storage (Cloudflare R2; S3-compatible) ----
# media.storage = r2 | local (local = the on-disk vault for offline dev). The R2 keys are SECRETS and
# come from the environment (R2_ACCESS_KEY / R2_SECRET_KEY); the rest are non-secret identifiers.
media.storage=${MEDIA_STORAGE:local}
r2.endpoint=https://a0f9703d5e575ba75476e7bc07ec8369.r2.cloudflarestorage.com
r2.bucket=coduel-media
r2.public-base-url=https://pub-25d48d749dfb4d0e879b4064ca025665.r2.dev
r2.access-key=${R2_ACCESS_KEY}
r2.secret-key=${R2_SECRET_KEY}
